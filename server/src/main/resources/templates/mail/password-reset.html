<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="x-apple-disable-message-reformatting">
    <title>{{appName}}</title>
  </head>
  <body style="margin:0;padding:0;background-color:#fafafa;color:#171717;font-family:ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
    <div style="display:none;max-height:0;overflow:hidden;opacity:0;color:transparent;">
      {{preheader}}
    </div>
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;background-color:#fafafa;">
      <tr>
        <td align="center" style="padding:48px 16px;">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;max-width:600px;background-color:#ffffff;border:1px solid #e5e5e5;border-radius:12px;">
            <tr>
              <td style="padding:40px 48px;">
                <p style="margin:0 0 8px 0;font-size:12px;line-height:16px;text-transform:uppercase;letter-spacing:0.05em;color:#737373;font-weight:600;">{{appName}}</p>
                <h1 style="margin:0 0 32px 0;font-size:24px;line-height:32px;font-weight:600;color:#171717;">{{title}}</h1>
                <p style="margin:0 0 16px 0;font-size:16px;line-height:24px;color:#171717;">{{greeting}}</p>
                <p style="margin:0 0 32px 0;font-size:16px;line-height:24px;color:#525252;">{{body}}</p>
                <table role="presentation" cellpadding="0" cellspacing="0" style="border-collapse:collapse;margin:0 0 32px 0;">
                  <tr>
                    <td style="border-radius:6px;background-color:#171717;">
                      <a href="{{actionUrl}}" style="display:inline-block;padding:14px 24px;font-size:14px;line-height:20px;font-weight:500;color:#ffffff;text-decoration:none;border-radius:6px;">{{buttonText}}</a>
                    </td>
                  </tr>
                </table>
                <p style="margin:0;font-size:14px;line-height:22px;color:#737373;">
                  {{expiryNote}}<br>
                  <a href="{{actionUrl}}" style="color:#171717;text-decoration:underline;word-break:break-all;display:inline-block;margin-top:8px;">{{actionUrl}}</a>
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding:24px 48px;background-color:#f5f5f5;border-top:1px solid #e5e5e5;border-radius:0 0 12px 12px;">
                <p style="margin:0;font-size:12px;line-height:18px;color:#a3a3a3;">
                  {{automatedNote}}
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
