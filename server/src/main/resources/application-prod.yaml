server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  shutdown: graceful

spring:
  threads:
    virtual:
      enabled: true

  lifecycle:
    timeout-per-shutdown-phase: 30s

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: VQCProdHikariPool
      maximum-pool-size: ${DB_POOL_MAX_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${DB_IDLE_TIMEOUT:600000}
      max-lifetime: ${DB_MAX_LIFETIME:1800000}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
          batch_size: 500
        order_updates: true
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      repositories:
        enabled: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    clean-disabled: true

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
          connectiontimeout: ${MAIL_CONNECTION_TIMEOUT:5000}
          timeout: ${MAIL_TIMEOUT:5000}
          writetimeout: ${MAIL_WRITE_TIMEOUT:5000}

  jackson:
    time-zone: Asia/Ho_Chi_Minh
    default-property-inclusion: non_null

  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY:}
        chat:
          model: ${GEMINI_MODEL:gemini-2.5-flash}
          temperature: 0
          max-output-tokens: ${GEMINI_MAX_TOKENS:1024}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: openid,profile,email
            redirect-uri: "{baseUrl}/api/v1/login/oauth2/code/{registrationId}"
          github:
            client-id: ${GITHUB_CLIENT_ID:}
            client-secret: ${GITHUB_CLIENT_SECRET:}
            scope: read:user,user:email
            redirect-uri: "{baseUrl}/api/v1/login/oauth2/code/{registrationId}"

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    root: INFO
    me.nghlong3004.vqc: INFO
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
    org.telegram: INFO

vqc:
  client:
    base-url: ${WEB_BASE_URL}
  server:
    base-url: ${SERVER_BASE_URL}
  mail:
    from: ${MAIL_FROM}
  security:
    access-expiration: 15
    refresh-expiration: 10080
    jwt:
      secret-key: ${JWT_SECRET_KEY}
    cookie:
      secure: true
      same-site: Strict
    secret-encryption-key: ${VQC_SECRET_ENCRYPTION_KEY}
  promptfoo:
    mode: cli
    work-dir: /app/runs
    binary-path: ./tooling/promptfoo-runner/node_modules/.bin/promptfoo
    max-concurrency: 1
    max-eval-time-ms: 300000
    per-test-timeout-ms: 60000
    grading-provider: ${GEMINI_GRADING_PROVIDER:google:gemini-2.5-flash}
    grading-api-key: ${GEMINI_API_KEY:}
  storage:
    type: ${VQC_STORAGE_TYPE:local}
    local:
      base-dir: ${VQC_STORAGE_LOCAL_BASE_DIR:/app/exports}
  worker:
    enabled: true
    queue-key: vqc:jobs:queue
