server {

    server_name vat.nghlong3004.me;

    client_max_body_size 50M;

    access_log /var/log/nginx/vat.access.log;
    error_log  /var/log/nginx/vat.error.log;

    # ── API requests → Spring Boot (direct, skip Next.js) ──
    location /api/v1/ {
        proxy_pass http://127.0.0.1:8080;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming (evaluation events) + long-running AI calls
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
    }

    # ── Everything else → Next.js ──
    location / {
        limit_req zone=general_limit burst=30 nodelay;

        proxy_pass http://127.0.0.1:3000;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=86400" always;

    # SSL managed by Certbot — update paths if domain changes
    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/vat.nghlong3004.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vat.nghlong3004.me/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

}
server {
    if ($host = vat.nghlong3004.me) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    listen [::]:80;

    server_name vat.nghlong3004.me;
    return 404;

}
