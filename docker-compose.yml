# ============================================================
# VSF QC Copilot — Local Docker Compose
# Frontend (Next.js + nginx) + Backend (Spring Boot) + DB + Redis
# All ports bound to 127.0.0.1 only
# ============================================================
# Usage:
#   docker compose up --build          # Start all services
#   docker compose up --build api db redis  # Backend only (FE runs natively)
#   docker compose down -v             # Stop + remove volumes
#   docker compose logs -f api         # Tail API logs
# ============================================================

services:
  # ---------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: vqc_dev
      POSTGRES_USER: vqc
      POSTGRES_PASSWORD: vqc
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vqc -d vqc_dev"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------
  # Redis
  # ---------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------
  # Backend API (Spring Boot)
  # ---------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: server/.env
    environment:
      # Override to point to compose services
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-vqc_dev}
      DB_USERNAME: ${POSTGRES_USER:-vqc}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-vqc}
      REDIS_HOST: redis
      # CORS: allow client dev server
      WEB_BASE_URL: http://localhost:3000
      SERVER_BASE_URL: http://localhost:8080
    volumes:
      - app-runs:/app/runs
      - app-exports:/app/exports
      - app-logs:/app/logs

  # ---------------------------------------------------------
  # Frontend (Next.js + nginx)
  # ---------------------------------------------------------
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - api

volumes:
  pgdata:
  app-runs:
  app-exports:
  app-logs: